name: Performance Smoke

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  frontend-lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
    - uses: actions/checkout@v6

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.9"

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: bun install --frozen-lockfile

    - name: Build frontend
      working-directory: ./frontend
      run: bun run build

    - name: Run Lighthouse CI assertions
      uses: treosh/lighthouse-ci-action@v12
      with:
        configPath: ./.github/lighthouse/lighthouserc.json
        uploadArtifacts: true
        temporaryPublicStorage: true

  backend-k6-p95:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: perf_user
          POSTGRES_PASSWORD: perf_password
          POSTGRES_DB: perf_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: pip
        cache-dependency-path: backend/requirements.txt

    - name: Install backend dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Apply database migrations
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+psycopg://perf_user:perf_password@localhost:5432/perf_db
        JWT_SECRET: perf-secret-key
        JWT_EXPIRES_IN: 3600
        DEVICE_API_SECRET: perf_device_secret_001_1234567890abcdef1234567890abc
      run: alembic upgrade head

    - name: Start API service
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+psycopg://perf_user:perf_password@localhost:5432/perf_db
        JWT_SECRET: perf-secret-key
        JWT_EXPIRES_IN: 3600
        DEVICE_API_SECRET: perf_device_secret_001_1234567890abcdef1234567890abc
      run: |
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        for i in {1..40}; do
          if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
            exit 0
          fi
          sleep 1
        done
        echo "Backend did not become ready in time"
        exit 1

    - name: Set up k6
      uses: grafana/setup-k6-action@v1

    - name: Run k6 p95 latency gate
      uses: grafana/run-k6-action@v1
      with:
        path: .github/k6/health-smoke.js

name: Publish Container Images

on:
  push:
    branches: [ main, develop ]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/publish-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/telemed-backend
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/telemed-frontend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ matrix.image }}
        tags: |
          type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
          type=raw,value=develop-latest,enable=${{ github.ref_name == 'develop' }}
          type=sha,prefix=sha-

    - name: Build and push ${{ matrix.name }} image
      id: build-and-push
      uses: docker/build-push-action@v6
      with:
        context: ${{ matrix.context }}
        file: ${{ matrix.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=${{ matrix.name }}
        cache-to: type=gha,mode=max,scope=${{ matrix.name }}

    - name: Run Trivy scan for ${{ matrix.name }} image
      uses: aquasecurity/trivy-action@0.33.1
      with:
        image-ref: ${{ matrix.image }}:sha-${{ github.sha }}
        format: sarif
        output: trivy-${{ matrix.name }}.sarif
        severity: CRITICAL,HIGH
        ignore-unfixed: true
        exit-code: "1"

    - name: Upload Trivy scan results for ${{ matrix.name }}
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-${{ matrix.name }}.sarif

name: CI Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run migrations
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+psycopg://test_user:test_password@localhost:5432/test_db
        JWT_SECRET: test-secret-key
        JWT_EXPIRES_IN: 3600
      run: |
        alembic upgrade head

    - name: Alembic head check
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+psycopg://test_user:test_password@localhost:5432/test_db
        JWT_SECRET: test-secret-key
        JWT_EXPIRES_IN: 3600
      run: |
        HEAD_COUNT=$(alembic heads | grep -c "(head)")
        if [ "$HEAD_COUNT" -ne 1 ]; then
          echo "Expected exactly 1 alembic head, got $HEAD_COUNT"
          alembic heads
          exit 1
        fi

    - name: Compile backend modules
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+psycopg://test_user:test_password@localhost:5432/test_db
        JWT_SECRET: test-secret-key
        JWT_EXPIRES_IN: 3600
      run: |
        python -m py_compile app/api/users.py app/api/meetings.py app/api/patients.py app/services/meeting.py

    - name: Run tests with coverage
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+psycopg://test_user:test_password@localhost:5432/test_db
        JWT_SECRET: test-secret-key
        JWT_EXPIRES_IN: 3600
      run: |
        pytest --cov=app --cov-report=xml --cov-report=term
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        fail_ci_if_error: false

  frontend-quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.3.9'

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: bun install --frozen-lockfile

    - name: Typecheck frontend
      working-directory: ./frontend
      run: bunx tsc --noEmit

    - name: Lint critical frontend modules
      working-directory: ./frontend
      run: bunx eslint lib/api.ts components/dashboard/users-table.tsx components/dashboard/patient-assignments-dialog.tsx

    - name: Run frontend tests
      working-directory: ./frontend
      run: bun run test

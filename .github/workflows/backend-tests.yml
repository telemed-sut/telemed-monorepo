name: CI Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install gitleaks
      run: |
        GITLEAKS_VERSION="8.24.2"
        curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
          | tar -xz
        sudo mv gitleaks /usr/local/bin/gitleaks
        gitleaks version

    - name: Run gitleaks scan
      run: |
        gitleaks git --redact --no-banner --exit-code 1 .

    - name: Run trufflehog scan (pull_request)
      if: github.event_name == 'pull_request'
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.pull_request.base.sha }}
        head: ${{ github.event.pull_request.head.sha }}
        extra_args: --results=verified,unknown --fail

    - name: Run trufflehog scan (push)
      if: github.event_name == 'push'
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.before }}
        head: ${{ github.sha }}
        extra_args: --results=verified,unknown --fail

  backend-test:
    runs-on: ubuntu-latest
    env:
      DEVICE_API_SECRET: test_device_secret_001_1234567890abcdef1234567890abc
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Lint backend with Ruff
      working-directory: ./backend
      run: |
        pip install ruff
        ruff check app tests --select E9,F63,F7,F82
    
    - name: Run migrations
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+psycopg://test_user:test_password@localhost:5432/test_db
        JWT_SECRET: test-secret-key
        JWT_EXPIRES_IN: 3600
      run: |
        alembic upgrade head

    - name: Alembic head check
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+psycopg://test_user:test_password@localhost:5432/test_db
        JWT_SECRET: test-secret-key
        JWT_EXPIRES_IN: 3600
      run: |
        HEAD_COUNT=$(alembic heads | grep -c "(head)")
        if [ "$HEAD_COUNT" -ne 1 ]; then
          echo "Expected exactly 1 alembic head, got $HEAD_COUNT"
          alembic heads
          exit 1
        fi

    - name: Compile backend modules
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+psycopg://test_user:test_password@localhost:5432/test_db
        JWT_SECRET: test-secret-key
        JWT_EXPIRES_IN: 3600
      run: |
        python -m py_compile app/api/users.py app/api/meetings.py app/api/patients.py app/services/meeting.py

    - name: Run tests with coverage
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql+psycopg://test_user:test_password@localhost:5432/test_db
        JWT_SECRET: test-secret-key
        JWT_EXPIRES_IN: 3600
      run: |
        python -m pytest --cov=app --cov-report=xml --cov-report=term --cov-fail-under=70

    - name: Build backend bytecode
      working-directory: ./backend
      run: |
        python -m compileall -q app
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        fail_ci_if_error: false

  frontend-quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: '1.3.9'

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: bun install --frozen-lockfile

    - name: Frontend dependency vulnerability scan (bun audit)
      working-directory: ./frontend
      continue-on-error: true
      run: bun audit --audit-level=high

    - name: Typecheck frontend
      working-directory: ./frontend
      run: bunx tsc --noEmit

    - name: Lint critical frontend modules
      working-directory: ./frontend
      run: bunx eslint lib/api.ts components/dashboard/users-table.tsx components/dashboard/patient-assignments-dialog.tsx

    - name: Run frontend tests
      working-directory: ./frontend
      run: bun run test -- --coverage

    - name: Build frontend
      working-directory: ./frontend
      run: bun run build

  backend-device-security-strict:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run strict device security smoke tests
      working-directory: ./backend
      env:
        DATABASE_URL: sqlite:///./strict_test.db
        JWT_SECRET: test-secret-key
        JWT_EXPIRES_IN: 3600
        DEVICE_API_ALLOW_JWT_SECRET_FALLBACK: "false"
        DEVICE_API_REQUIRE_REGISTERED_DEVICE: "true"
        DEVICE_API_REQUIRE_BODY_HASH_SIGNATURE: "true"
        DEVICE_API_REQUIRE_NONCE: "true"
        DEVICE_API_SECRETS: '{"strict-device-001":"strict_device_secret_001_1234567890abcdef1234567890abc"}'
      run: |
        python -m pytest -q tests/test_pressure_security.py::test_add_pressure_accepts_strict_mode_with_registered_device

  backend-security-scan:
    runs-on: ubuntu-latest
    env:
      DEVICE_API_SECRET: test_device_secret_001_1234567890abcdef1234567890abc

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install scan tools
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit bandit

    - name: Dependency vulnerability scan (pip-audit)
      continue-on-error: true
      run: pip-audit -r backend/requirements.txt

    - name: SAST scan (Bandit)
      run: bandit -q -r backend/app

  docker-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build backend image
      run: docker build -t telemed-backend:ci ./backend

    - name: Build frontend image
      run: docker build -t telemed-frontend:ci ./frontend

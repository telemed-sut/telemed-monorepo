name: Security sign-off evidence

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies and audit tooling
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit and capture output
        id: pip_audit
        continue-on-error: true
        working-directory: ./backend
        run: |
          mkdir -p ../artifacts/security
          python -m pip_audit -r requirements.txt -f json \
            > ../artifacts/security/backend-pip-audit.json

      - name: Upload backend dependency audit artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-pip-audit
          path: artifacts/security/backend-pip-audit.json
          if-no-files-found: error

      - name: Fail if backend dependency audit found blocking issues
        if: steps.pip_audit.outcome != 'success'
        run: exit 1

  frontend-dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: bun install --frozen-lockfile

      - name: Run bun audit and capture output
        id: bun_audit
        continue-on-error: true
        working-directory: ./frontend
        run: |
          mkdir -p ../artifacts/security
          bun audit --audit-level=high \
            > ../artifacts/security/frontend-bun-audit.txt 2>&1

      - name: Upload frontend dependency audit artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-bun-audit
          path: artifacts/security/frontend-bun-audit.txt
          if-no-files-found: error

      - name: Fail if frontend dependency audit found blocking issues
        if: steps.bun_audit.outcome != 'success'
        run: exit 1

# Alert policy template for the admin_force_password_reset spike detector.
#
# Replace the placeholder project, service, and notification channel values.
# Deploy with:
#   gcloud alpha monitoring policies create \
#     --project="${PROJECT_ID}" \
#     --policy-from-file=infra/gcp/alerts/admin-force-password-reset-alert-policy.yaml
#
# Prerequisite:
# - Create the logs-based metric from
#   infra/gcp/alerts/admin-force-password-reset-log-metric.yaml

displayName: Security: admin force password reset spike
combiner: OR
enabled: true
conditions:
  - displayName: More than 5 successful admin password resets in 1 hour
    conditionThreshold:
      filter: >-
        resource.type="cloud_run_revision"
        resource.labels.service_name="REPLACE_BACKEND_SERVICE"
        metric.type="logging.googleapis.com/user/admin_force_password_reset_count"
      aggregations:
        - alignmentPeriod: 3600s
          perSeriesAligner: ALIGN_SUM
        - alignmentPeriod: 3600s
          crossSeriesReducer: REDUCE_SUM
          groupByFields:
            - resource.labels.service_name
      comparison: COMPARISON_GT
      thresholdValue: 5
      duration: 0s
      trigger:
        count: 1
documentation:
  subject: Security alert: admin_force_password_reset spike
  content: >-
    More than five successful admin-forced password resets were recorded in one
    hour for the backend service. Treat this as a potential insider threat or a
    compromised privileged account. Validate the matching AuditLog rows,
    confirm operator intent, and rotate privileged credentials if the activity
    is unexpected.
notificationChannels:
  - projects/REPLACE_PROJECT_ID/notificationChannels/REPLACE_SECURITY_CHANNEL
alertStrategy:
  notificationRateLimit:
    period: 3600s

# Logs-based metric template for successful admin-forced password resets.
#
# Replace the placeholder service name before creating the metric.
# Deploy with:
#   gcloud logging metrics create admin_force_password_reset_count \
#     --project="${PROJECT_ID}" \
#     --config-from-file=infra/gcp/alerts/admin-force-password-reset-log-metric.yaml
#
# This metric depends on the backend emitting a structured stdout log with:
# - event=security_audit_event
# - action=admin_force_password_reset
# - status=success

description: Count successful admin-forced password resets from the backend.
filter: >-
  resource.type="cloud_run_revision"
  resource.labels.service_name="REPLACE_BACKEND_SERVICE"
  textPayload:"\"event\":\"security_audit_event\""
  textPayload:"\"action\":\"admin_force_password_reset\""
  textPayload:"\"status\":\"success\""
labelExtractors:
  service_name: EXTRACT(resource.labels.service_name)
metricDescriptor:
  displayName: Admin force password reset count
  metricKind: DELTA
  valueType: INT64
  unit: "1"
  labels:
    - key: service_name
      description: Cloud Run service name that emitted the security event.
      valueType: STRING

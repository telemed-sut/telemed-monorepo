services:
  backend:
    init: true
    image: ${BACKEND_IMAGE:-ghcr.io/telemed-sut/telemed-backend:latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600}
      DEVICE_API_SECRET: ${DEVICE_API_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      ADMIN_OIDC_ENABLED: ${ADMIN_OIDC_ENABLED:-false}
      ADMIN_OIDC_ENFORCED: ${ADMIN_OIDC_ENFORCED:-false}
      ADMIN_OIDC_PROVIDER_NAME: ${ADMIN_OIDC_PROVIDER_NAME:-authentik}
      ADMIN_OIDC_ISSUER_URL: ${ADMIN_OIDC_ISSUER_URL:-}
      ADMIN_OIDC_CLIENT_ID: ${ADMIN_OIDC_CLIENT_ID:-}
      ADMIN_OIDC_CLIENT_SECRET: ${ADMIN_OIDC_CLIENT_SECRET:-}
      ADMIN_OIDC_REDIRECT_URI: ${ADMIN_OIDC_REDIRECT_URI:-}
      ADMIN_OIDC_POST_LOGOUT_REDIRECT_URI: ${ADMIN_OIDC_POST_LOGOUT_REDIRECT_URI:-}
      ADMIN_OIDC_SCOPES: ${ADMIN_OIDC_SCOPES:-openid,profile,email}
      ADMIN_OIDC_ALLOWED_EMAIL_DOMAINS: ${ADMIN_OIDC_ALLOWED_EMAIL_DOMAINS:-}
      ADMIN_OIDC_REQUIRED_GROUP: ${ADMIN_OIDC_REQUIRED_GROUP:-}
      RUN_MIGRATIONS_ON_STARTUP: ${RUN_MIGRATIONS_ON_STARTUP:-true}
      RUN_SEED_ON_STARTUP: ${RUN_SEED_ON_STARTUP:-false}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - frontend-net
      - backend-net
      - db-net

  frontend:
    init: true
    image: ${FRONTEND_IMAGE:-ghcr.io/telemed-sut/telemed-frontend:latest}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
      NEXT_SERVER_API_PROXY_TARGET: ${NEXT_SERVER_API_PROXY_TARGET:-http://backend:8000}
      NEXT_SERVER_API_BASE_URL: ${NEXT_SERVER_API_BASE_URL:-http://backend:8000}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1));",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - frontend-net
      - backend-net

  authentik-postgresql:
    profiles: ["identity"]
    init: true
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AUTHENTIK_POSTGRES_USER:-authentik}
      POSTGRES_PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD:-authentik}
      POSTGRES_DB: ${AUTHENTIK_POSTGRES_DB:-authentik}
    volumes:
      - authentik_postgres_data:/var/lib/postgresql/data
    networks:
      - db-net

  authentik-redis:
    profiles: ["identity"]
    init: true
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      AUTHENTIK_REDIS_PASSWORD: ${AUTHENTIK_REDIS_PASSWORD}
    command:
      [
        "sh",
        "-c",
        "exec redis-server --save '' --appendonly no --requirepass \"$${AUTHENTIK_REDIS_PASSWORD}\"",
      ]
    networks:
      - db-net

  authentik-server:
    profiles: ["identity"]
    init: true
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server:latest}
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRES_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_POSTGRES_DB:-authentik}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_REDIS__PASSWORD: ${AUTHENTIK_REDIS_PASSWORD}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    ports:
      - "${AUTHENTIK_PORT:-9000}:9000"
    depends_on:
      - authentik-postgresql
      - authentik-redis
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    networks:
      - backend-net
      - db-net

  authentik-worker:
    profiles: ["identity"]
    init: true
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server:latest}
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRES_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_POSTGRES_DB:-authentik}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_REDIS__PASSWORD: ${AUTHENTIK_REDIS_PASSWORD}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    depends_on:
      - authentik-postgresql
      - authentik-redis
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    networks:
      - backend-net
      - db-net

volumes:
  authentik_postgres_data:
  authentik_media:
  authentik_templates:

networks:
  frontend-net:
  backend-net:
  db-net:

services:
  frontend:
    build: ./frontend
    container_name: patient-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

  backend:
    build: ./backend
    container_name: patient-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/patient_db
      - JWT_SECRET=${JWT_SECRET:-change_this_jwt_secret_for_local_dev_only_32_chars_minimum}
      - JWT_EXPIRES_IN=3600
      - DEVICE_API_SECRET=${DEVICE_API_SECRET:-change_this_device_secret_for_local_dev_only_32_chars_minimum}
      - DEVICE_API_SECRETS=${DEVICE_API_SECRETS:-}
      - DEVICE_API_ALLOW_JWT_SECRET_FALLBACK=${DEVICE_API_ALLOW_JWT_SECRET_FALLBACK:-false}
      - DEVICE_API_REQUIRE_REGISTERED_DEVICE=${DEVICE_API_REQUIRE_REGISTERED_DEVICE:-false}
      - DEVICE_API_REQUIRE_BODY_HASH_SIGNATURE=${DEVICE_API_REQUIRE_BODY_HASH_SIGNATURE:-false}
      - DEVICE_API_REQUIRE_NONCE=${DEVICE_API_REQUIRE_NONCE:-false}
      - DEVICE_API_NONCE_TTL_SECONDS=${DEVICE_API_NONCE_TTL_SECONDS:-300}
      - DEVICE_API_MAX_BODY_BYTES=${DEVICE_API_MAX_BODY_BYTES:-262144}
    volumes:
      - ./backend:/app
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15-alpine
    container_name: patient-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=patient_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}"
        NEXT_SERVER_API_PROXY_TARGET: "${NEXT_SERVER_API_PROXY_TARGET:-http://localhost:8000}"
        NEXT_SERVER_API_BASE_URL: "${NEXT_SERVER_API_BASE_URL:-http://localhost:8000}"
    container_name: patient-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}"
      NEXT_SERVER_API_PROXY_TARGET: "${NEXT_SERVER_API_PROXY_TARGET:-http://localhost:8000}"
      NEXT_SERVER_API_BASE_URL: "${NEXT_SERVER_API_BASE_URL:-http://localhost:8000}"
    depends_on:
      - backend
    restart: always

  backend:
    build: ./backend
    container_name: patient-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required. Run backend/scripts/bootstrap_backend_env.sh or use Infisical before running docker compose.}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required. Run backend/scripts/bootstrap_backend_env.sh or use Infisical before running docker compose.}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-3600}"
      PASSWORD_RESET_EXPIRES_IN: "${PASSWORD_RESET_EXPIRES_IN:-900}"
      PASSWORD_RESET_RETURN_TOKEN_IN_RESPONSE: "${PASSWORD_RESET_RETURN_TOKEN_IN_RESPONSE:-false}"
      FRONTEND_BASE_URL: "${FRONTEND_BASE_URL:-http://localhost:3000}"
      INVITE_EXPIRES_IN_HOURS: "${INVITE_EXPIRES_IN_HOURS:-24}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}"

      DEVICE_API_SECRET: "${DEVICE_API_SECRET:-change_this_device_secret_for_local_dev_only_32_chars_minimum}"
      DEVICE_API_SECRETS: "${DEVICE_API_SECRETS:-}"
      DEVICE_API_ALLOW_JWT_SECRET_FALLBACK: "${DEVICE_API_ALLOW_JWT_SECRET_FALLBACK:-false}"
      DEVICE_API_REQUIRE_REGISTERED_DEVICE: "${DEVICE_API_REQUIRE_REGISTERED_DEVICE:-false}"
      DEVICE_API_REQUIRE_BODY_HASH_SIGNATURE: "${DEVICE_API_REQUIRE_BODY_HASH_SIGNATURE:-false}"
      DEVICE_API_REQUIRE_NONCE: "${DEVICE_API_REQUIRE_NONCE:-false}"
      DEVICE_API_NONCE_TTL_SECONDS: "${DEVICE_API_NONCE_TTL_SECONDS:-300}"
      DEVICE_API_MAX_BODY_BYTES: "${DEVICE_API_MAX_BODY_BYTES:-262144}"

      AUTH_COOKIE_NAME: "${AUTH_COOKIE_NAME:-access_token}"
      AUTH_COOKIE_SECURE: "${AUTH_COOKIE_SECURE:-false}"
      AUTH_COOKIE_SAMESITE: "${AUTH_COOKIE_SAMESITE:-lax}"

      MAX_LOGIN_ATTEMPTS: "${MAX_LOGIN_ATTEMPTS:-10}"
      ACCOUNT_LOCKOUT_MINUTES: "${ACCOUNT_LOCKOUT_MINUTES:-15}"
      ADMIN_MAX_LOGIN_ATTEMPTS: "${ADMIN_MAX_LOGIN_ATTEMPTS:-15}"
      ADMIN_ACCOUNT_LOCKOUT_MINUTES: "${ADMIN_ACCOUNT_LOCKOUT_MINUTES:-3}"
      MIN_ACTIVE_ADMIN_ACCOUNTS: "${MIN_ACTIVE_ADMIN_ACCOUNTS:-2}"
      SUPER_ADMIN_EMAILS: "${SUPER_ADMIN_EMAILS:-admin@example.com}"
      ADMIN_UNLOCK_WHITELISTED_IPS: "${ADMIN_UNLOCK_WHITELISTED_IPS:-127.0.0.1,::1}"
      TRUSTED_PROXY_IPS: "${TRUSTED_PROXY_IPS:-127.0.0.1,::1}"
      SECURITY_403_SPIKE_THRESHOLD_1H: "${SECURITY_403_SPIKE_THRESHOLD_1H:-25}"
      SECURITY_WHITELISTED_IPS: "${SECURITY_WHITELISTED_IPS:-127.0.0.1,::1}"
      RATE_LIMIT_WHITELIST: "${RATE_LIMIT_WHITELIST:-127.0.0.1,::1}"

      ADMIN_2FA_REQUIRED: "${ADMIN_2FA_REQUIRED:-true}"
      ADMIN_2FA_ISSUER: "${ADMIN_2FA_ISSUER:-Telemed Admin}"
      TRUSTED_DEVICE_COOKIE_NAME: "${TRUSTED_DEVICE_COOKIE_NAME:-trusted_device_token}"
      ADMIN_TRUSTED_DEVICE_DAYS: "${ADMIN_TRUSTED_DEVICE_DAYS:-7}"
      USER_TRUSTED_DEVICE_DAYS: "${USER_TRUSTED_DEVICE_DAYS:-30}"
      BACKUP_CODE_COUNT: "${BACKUP_CODE_COUNT:-10}"
      BACKUP_CODE_EXPIRES_DAYS: "${BACKUP_CODE_EXPIRES_DAYS:-365}"

      SPECIALIST_INVITE_ONLY: "${SPECIALIST_INVITE_ONLY:-true}"
      ENABLE_BREAK_GLASS_ACCESS: "${ENABLE_BREAK_GLASS_ACCESS:-false}"

      NOVU_API_KEY: "${NOVU_API_KEY:-}"
      NOVU_ENABLED: "${NOVU_ENABLED:-false}"

      MEETING_VIDEO_PROVIDER: "${MEETING_VIDEO_PROVIDER:-disabled}"
      MEETING_VIDEO_TOKEN_TTL_SECONDS: "${MEETING_VIDEO_TOKEN_TTL_SECONDS:-900}"
      MEETING_PATIENT_INVITE_TTL_SECONDS: "${MEETING_PATIENT_INVITE_TTL_SECONDS:-86400}"
      MEETING_PATIENT_JOIN_BASE_URL: "${MEETING_PATIENT_JOIN_BASE_URL:-}"
      MEETING_VIDEO_ROOM_PREFIX: "${MEETING_VIDEO_ROOM_PREFIX:-telemed}"
      ZEGO_APP_ID: "${ZEGO_APP_ID:-}"
      ZEGO_SERVER_SECRET: "${ZEGO_SERVER_SECRET:-}"
      REDIS_URL: "${REDIS_URL:-}"

      RUN_MIGRATIONS_ON_STARTUP: "${RUN_MIGRATIONS_ON_STARTUP:-true}"
      RUN_SEED_ON_STARTUP: "${RUN_SEED_ON_STARTUP:-true}"
    volumes:
      - ./backend:/app
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15-alpine
    container_name: patient-db
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      POSTGRES_DB: "${POSTGRES_DB:-patient_db}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

version: '3.8'

services:
  # Frontend service (Next.js)
  frontend:
    # Build from the 'frontend' directory (rename dashboard-3 to frontend)
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: patient-frontend
    ports:
      - "3000:3000"
    environment:
      # Connect to backend service internally on docker network
      - NEXT_PUBLIC_API_BASE_URL=http://backend:8000
    depends_on:
      - backend
    restart: always

  # Backend service (Python/Rust)
  backend:
    # Assuming backend code is in 'backend' directory
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: patient-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/patient_db
      - JWT_SECRET=supersecretkey
      - JWT_EXPIRES_IN=3600
    depends_on:
      - db
    restart: always

  # Database service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: patient-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=patient_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
